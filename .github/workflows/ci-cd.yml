      - name: Build and push Docker image
        if: success()
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile
          tags: ${{ secrets.DOCKER_USERNAME }}/main-contactkeeper-api:latest
          push: true  
          build-args: |
                  BUILDKIT_INLINE_CACHE=1
          

      - name: Run tests
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
          DOTNET_NOLOGO: true
          ASPNETCORE_ENVIRONMENT: ${{ secrets.ENV_DEVOPS }}                
        run: dotnet test ./ContactKeeper.Test/ContactKeeper.Test.csproj --configuration Release --verbosity normal

      - name: Run Docker container
        run: |
          docker rm -f contactkeeper || true
          docker run --name contactkeeper \
            --network contactkeeper-network \
            -p 5000:5000 \
            -e "ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=ContactKeeper;User Id=sa;Password=${{ secrets.SQL_SERVER_PASSWORD }};TrustServerCertificate=True;" \
