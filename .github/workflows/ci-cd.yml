name: ci-cd pipeline test API ContactKeeper

on:
  push:
    branches:
      - devops
  pull_request:
    branches:
      - main

jobs:
  Build-Dockerfile:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          driver: docker-container
          install: true

      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Checkout code
        uses: actions/checkout@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile
          tags: ${{ secrets.DOCKER_USERNAME }}/main-contactkeeper-api:latest
          push: true
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  Test-Database:
    runs-on: ubuntu-latest
    needs: [Build-Dockerfile]
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Create Docker network
        run: |
            echo "Creating Docker network..."
            docker network create contactkeeper-network || true
            echo "Verifying network exists..."
            docker network inspect contactkeeper-network > /dev/null || exit 1
            echo "Network ready!" run: docker network create contactkeeper-network

      - name: Set up SQL Server
        run: |
            echo "Starting SQL Server container..."
            docker run --name sqlserver \
              --network contactkeeper-network \
              -e "ACCEPT_EULA=Y" \
              -e "MSSQL_SA_PASSWORD=${{ secrets.SQL_SERVER_PASSWORD }}" \
              -p 1433:1433 \
              -d mcr.microsoft.com/mssql/server:2022-latest
        
            if [ $? -ne 0 ]; then
              echo "Failed to start SQL Server container"
              docker logs sqlserver
              exit 1
            fi
        
            echo "Installing mssql-tools..."
            docker exec --user root sqlserver bash -c "apt-get update && \
              apt-get remove -y libodbc2 libodbcinst2 unixodbc-common || true && \
              apt-get install -y gnupg curl apt-transport-https && \
              curl https://packages.microsoft.com/keys/microsoft.asc | apt-key add - && \
              curl https://packages.microsoft.com/config/ubuntu/20.04/prod.list > /etc/apt/sources.list.d/mssql-release.list && \
              apt-get update && \
              ACCEPT_EULA=Y apt-get install -y mssql-tools unixodbc-dev && \
              ln -s /opt/mssql-tools/bin/sqlcmd /usr/bin/sqlcmd" || { echo "Package installation failed"; docker logs sqlserver; exit 1; }
        
            echo "Waiting for SQL Server to initialize..."
            for i in {1..60}; do
              if docker exec sqlserver /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P ${{ secrets.SQL_SERVER_PASSWORD }} -Q "SELECT 1" > /dev/null 2>&1; then
                echo "SQL Server is ready!"
                break
              fi
              echo "Waiting for SQL Server... ($i/60)"
              sleep 2
            done
            if [ $i -eq 60 ]; then
              echo "SQL Server failed to start within timeout"
              docker logs sqlserver
              exit 1
            fi
        
            echo "Creating database..."
            docker exec -i sqlserver sqlcmd -S localhost -U sa -P ${{ secrets.SQL_SERVER_PASSWORD }} -Q "CREATE DATABASE ContactKeeper;" || { echo "Failed to create database"; docker logs sqlserver; exit 1; }

  Test-API:
    runs-on: ubuntu-latest
    needs: [Test-Database]
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Run API container
        run: |
            docker run --name contactkeeper \
              --network contactkeeper-network \
              -p 5000:5001 \
              -e "DatabaseSettings__${{ secrets.ENV_DEVOPS }}=Server=sqlserver,1433;Database=ContactKeeper;User Id=sa;Password=${{ secrets.SQL_SERVER_PASSWORD }};TrustServerCertificate=True;" \
              -d ${{ secrets.DOCKER_USERNAME }}/main-contactkeeper-api:latest

      - name: Run tests and health check
        env:
          ASPNETCORE_ENVIRONMENT: ${{ secrets.ENV_DEVOPS }}
        run: |
          echo "Waiting for API to initialize..."
          for i in {1..30}; do
            if curl -f ${{ secrets.API_URL }}/Health/HealthDataBase > /dev/null 2>&1; then
              echo "API is ready!"
              break
            fi
            echo "Waiting for API... ($i/5)"
            sleep 2
          done
          if [ $i -eq 30 ]; then
            echo "API failed to start"
            docker logs contactkeeper
            exit 1
          fi

          dotnet test ./ContactKeeper.Test/ContactKeeper.Test.csproj --configuration Release --verbosity normal

